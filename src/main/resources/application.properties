spring.application.name=WebShoppers
spring.datasource.url=jdbc:h2:mem:testdb
spring.h2.console.enabled=true

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%clr(${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}){red}